<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Tarefas</title>
  <link rel="stylesheet"
        href="style.css">
  <script defer src="./src/app.js"></script>
</head>

<body>
<header>
  <h1>📋 Gerenciador de Tarefas</h1>
</header>
<div>
  <section class="nova-tarefa">
    <h2>Nova Tarefa</h2>
    <div class="forms">
      <input
        type="text"
        id="tarefaInput"
        placeholder="Digite uma tarefa..."
      >

      <button id="btnAdicionar">
        Adicionar
      </button>

    </div>
  </section>

  <section class="lista-container">
    <div class="topo">
      <h2>Suas Tarefas</h2>
      <div class="estatisticas">
        <span>
          Total:
          <p id="total">0</p>
        </span>

        <span>
          Pendentes:
          <p id="pendentes">0</p>
        </span>

        <span>
          Concluídas:
          <p id="concluidas">0</p>
        </span>

      </div>
    </div>
    <ul id="listaTarefas"></ul>
  </section>
</div>

<footer>
  Desenvolvido com ❤️
</footer>
</body>
</html>
